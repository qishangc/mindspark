<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MindSpark</title>
    <meta name="description" content="MindSpark - A sleek native-feeling ideation tool.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mindspark_lite.css">
</head>

<body>
    <div class="app-wrapper">
        <!-- App Header (Native feeling) -->
        <header class="app-header">
            <div class="header-left">
                <div>
                    <h1 class="header-title">MindSpark</h1>
                    <div class="header-subtitle subtitle">和自己的想法重逢</div>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="toggleArchiveView()" id="archiveToggleBtn" class="icon-btn" title="归档">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                </button>
                <button onclick="openSettings()" id="settingsBtn" class="icon-btn" title="设置">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                </button>
                <button onclick="toggleTheme()" id="themeBtn" class="icon-btn" title="切换主题">🌙</button>
            </div>
        </header>

        <!-- Toolbar (Search & Sort) -->
        <div class="toolbar">
            <div class="search-container">
                <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="searchInput" class="search-input" placeholder="搜索想法...">
            </div>
            <div class="toolbar-filters">
                <button onclick="drawRandomOldNote()" id="drawOldNoteBtn" class="secondary-btn" style="padding: 6px 12px; font-size: 13px;">抽旧想法</button>
                <button onclick="setSort('time')" id="sortTimeBtn" class="filter-btn active">时间</button>
                <button onclick="setSort('random')" id="sortRandomBtn" class="filter-btn">随机</button>
            </div>
        </div>

        <!-- Input Trigger -->
        <div class="input-trigger-container">
            <div class="input-trigger" onclick="openNoteModal()" id="note-input-area">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                <span>写点什么... (Ctrl+N)</span>
            </div>
        </div>

        <!-- Main Workspace -->
        <div class="main-content">
            <div id="noteList" class="note-list"></div>
            
            <div id="emptyState" class="empty-state" style="display:none">
                <div class="empty-icon">💡</div>
                <div class="empty-title">还没有任何想法</div>
                <div class="empty-desc">按 Ctrl+N 或点击上方输入框，开始记录</div>
            </div>

            <!-- Stats & Load More -->
            <div id="loadMoreContainer">
                <button id="loadMoreBtn" class="secondary-btn" style="display:none;" onclick="loadMoreNotes()">加载更多</button>
            </div>
            <div id="noteStats" class="note-stats"></div>
        </div>
    </div>

    <!-- Modals Overlay -->
    <!-- 1. Note Form Modal -->
    <div id="noteModal" class="modal-overlay" onclick="closeNoteModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title" id="noteModalTitle">新想法</h3>
                <button onclick="closeNoteModal()" class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="noteModalHint" style="display:none; margin-bottom:12px; padding:10px 12px; border-radius:12px; background:var(--surface-secondary); color:var(--text-secondary); font-size:13px;"></div>
                <div class="unified-source-picker">
                    <div class="unified-input-wrapper" id="unifiedInputWrapper">
                        <div class="unified-icon-box">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                        </div>
                        <input type="text" id="unifiedSourceInput" placeholder="附加来源 (粘贴链接、出处文字、或 Ctrl+V 图片)...">
                        <button class="image-upload-trigger" onclick="document.getElementById('unifiedImageInput').click()" title="选择图片">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        </button>
                        <input type="file" id="unifiedImageInput" accept="image/*" style="display:none;" onchange="handleUnifiedImageSelect(event)">
                    </div>
                    <div id="unifiedSourcePreview" class="unified-source-preview" style="display:none;"></div>
                </div>

                <textarea id="noteInput" class="modal-textarea" placeholder="写点什么..."></textarea>
            </div>
            <div class="modal-footer">
                <span id="charCount" style="font-size: 13px; color: var(--text-secondary); margin-right: auto;">0 字</span>
                <button class="secondary-btn" onclick="closeNoteModal()">取消</button>
                <button class="primary-btn" onclick="saveNote()" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <!-- 2. Detail & Edit Modal -->
    <div id="detailModal" class="modal-overlay" onclick="closeDetailModal()">
        <div class="modal-box detail-modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <div id="detailTime" class="detail-time"></div>
                <div style="display:flex; gap:8px;">
                    <!-- Normal Actions -->
                    <div id="detailNormalActions" style="display:flex; gap:4px; align-items:center;">
                        <button id="deleteBtn" onclick="requestDeleteCurrentNote()" title="删除" class="icon-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <button id="archiveBtn" onclick="toggleArchiveNote()" title="归档" class="icon-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
                        </button>
                        <button onclick="startContinueThinking()" title="继续思考" class="secondary-btn" style="padding:6px 10px; font-size:12px;">
                            继续思考
                        </button>
                        <button onclick="startEditNote()" title="编辑" class="icon-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                    </div>
                    <!-- Edit Actions -->
                    <div id="detailEditActions" style="display:none; gap:8px;">
                        <button onclick="cancelEditNote()" class="secondary-btn">取消</button>
                        <button onclick="saveEditNote()" class="primary-btn" id="editSaveBtn">完成保存</button>
                    </div>
                    <button onclick="closeDetailModal()" class="icon-btn" style="margin-left: 12px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
            </div>
            <div class="modal-body">
                <div id="detailSource" class="detail-source" style="display:none;"></div>
                <div id="detailViewContent" class="detail-view-content"></div>
                <textarea id="detailEditContent" class="detail-edit-textarea" style="display:none;"></textarea>

                <div id="detailRelated" class="detail-related">
                    <div class="detail-related-title">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
                        相关联的想法
                    </div>
                    <div id="detailRelatedList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. Settings Modal -->
    <div id="settingsModal" class="modal-overlay" onclick="closeSettings()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h3 class="modal-title">设置偏好</h3>
                <button onclick="closeSettings()" class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">AI 向量引擎</label>
                    <div style="font-size:13px; color:var(--text-secondary); margin-bottom:12px;">
                        配置 AI 后，新建的想法会自动生成语义向量，用于自动推荐相关联或过往相似的想法。
                    </div>
                    <select id="providerSelect" onchange="onProviderChange()" class="form-select">
                        <option value="custom">自定义 (Custom)</option>
                        <option value="openai">OpenAI</option>
                        <option value="gemini">Google Gemini</option>
                        <option value="deepseek">DeepSeek</option>
                        <option value="siliconflow">SiliconFlow (硅基流动)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">API Base URL</label>
                    <input type="text" id="apiBaseUrl" placeholder="https://api.openai.com/v1">
                </div>

                <div class="form-group">
                    <label class="form-label">API Key</label>
                    <input type="password" id="apiKey" placeholder="sk-...">
                </div>

                <div class="form-group">
                    <label class="form-label">Embedding Model</label>
                    <input type="text" id="apiModel" placeholder="text-embedding-3-small">
                </div>

                <div style="display:flex; justify-content:flex-end; gap:8px;">
                    <button class="secondary-btn" onclick="testApiConnection()">测试连接</button>
                </div>

                <hr class="divider">

                <div class="form-group">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <span class="form-label" style="margin-bottom:0;">数据备份与恢复</span>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button class="secondary-btn" onclick="exportData()" style="padding:4px 10px; font-size:12px;">导出 JSON</button>
                            <button class="secondary-btn" onclick="exportMarkdown()" style="padding:4px 10px; font-size:12px;">导出 MD</button>
                            <button class="secondary-btn" onclick="document.getElementById('importFile').click()" style="padding:4px 10px; font-size:12px;">导入 JSON</button>
                            <button class="secondary-btn" onclick="document.getElementById('importMdFile').click()" style="padding:4px 10px; font-size:12px;">导入 MD</button>
                        </div>
                    </div>
                    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
                    <input type="file" id="importMdFile" accept=".md,.markdown,.txt" style="display:none" multiple onchange="importMdFiles(event)">
                </div>

                <hr class="divider">

                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:14px; font-weight:500; color:var(--text-primary);">处理旧想法向量</div>
                    <button class="primary-btn" onclick="processAllNotes()" id="processBtn" style="padding:6px 12px; font-size:13px;">一键生成补全</button>
                </div>
                <div id="processStatus" style="font-size:12px; color:var(--text-secondary); margin-top:8px;"></div>

            </div>
            <div class="modal-footer">
                <button class="secondary-btn" onclick="closeSettings()">取消</button>
                <button class="primary-btn" onclick="saveSettings()">保存配置</button>
            </div>
        </div>
    </div>

    <script src="desktop_bridge.js"></script>
    <script src="script.js"></script>
</body>

</html>
